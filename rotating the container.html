<html>
    <head>
        <title>ROTATE container</title>
    <style>
        body{
            align-items: center;
            padding:200px;
        }
    
    .container{
        height: 200px;
        width: 300px;
        display: flex;
        border-radius: 20pt;
        background-color: rgb(85, 204, 167);
        padding: 60px;
        justify-content: center;
        transition:55s;
    }
    .container:hover{
         transform: rotate(20000deg);
    }
        </style>
    </head>
    <body>
        <div class="container">
            <div>
                <h1>
                JUST TOUCH
                </h1>
            </div>
        </div>
    </body>
</html>
