<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Raksha Bandhan</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to right, #ffe0b2, #ffccbc);
      color: #6d4c41;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .rakhi-card {
      background-color: #fff8e1;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    .rakhi-card h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      margin-bottom: 10px;
      color: #d84315;
    }

    .rakhi-card p {
      font-size: 18px;
      margin-top: 0;
    }

    .rakhi-img {
      margin-top: 20px;
    }

    .rakhi-img img {
      width: 120px;
      height: auto;
    }

    .rakhi-card .quote {
      margin-top: 30px;
      font-style: italic;
      color: #8d6e63;
    }
  </style>
</head>
<body>
  <div class="rakhi-card">
    <h1>Happy Raksha Bandhan</h1>
    <p>Celebrating the bond of love and protection between brothers and sisters.</p>
    <div class="rakhi-img">
      <img src="https://noveltysweets.com/cdn/shop/articles/rakshabandhan-rakhi.jpg?v=1722666052" alt="Rakhi">
    </div>
    <p class="quote">“A bond that time cannot break, a thread that love always ties.”</p>
  </div>
</body>
</html>
